<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Massive Platformer</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #1a1a2e;
			overflow: hidden;
			/* Prevent all text selection, callouts, and tap highlights on mobile */
			-webkit-user-select: none;
			user-select: none;
			-webkit-touch-callout: none;
			-webkit-tap-highlight-color: transparent;
			touch-action: none;
		}
		canvas { display: block; touch-action: none; }
		#status {
			position: fixed;
			top: 10px;
			left: 10px;
			color: #eee;
			font-family: monospace;
			font-size: 14px;
			background: rgba(0,0,0,0.6);
			padding: 8px 12px;
			border-radius: 4px;
			z-index: 10;
			pointer-events: none;
		}
		#controls {
			position: fixed;
			bottom: 10px;
			left: 10px;
			color: #888;
			font-family: monospace;
			font-size: 12px;
			z-index: 10;
			pointer-events: none;
		}

		/* --- Touch controls (hidden on desktop) --- */
		#touch-controls {
			display: none;
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			height: 160px;
			z-index: 20;
			pointer-events: none;
		}
		.touch-btn {
			position: absolute;
			pointer-events: auto;
			border: 2px solid rgba(255,255,255,0.25);
			border-radius: 16px;
			background: rgba(255,255,255,0.08);
			color: rgba(255,255,255,0.5);
			font-size: 32px;
			font-family: monospace;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.05s, border-color 0.05s;
			/* Prevent any native touch behaviors */
			-webkit-touch-callout: none;
			touch-action: none;
		}
		.touch-btn.active {
			background: rgba(255,255,255,0.2);
			border-color: rgba(255,255,255,0.5);
			color: rgba(255,255,255,0.8);
		}

		/* D-pad: left side */
		#btn-left  { left: 16px;  bottom: 24px; width: 72px; height: 72px; }
		#btn-right { left: 104px; bottom: 24px; width: 72px; height: 72px; }
		#btn-up    { left: 60px;  bottom: 104px; width: 72px; height: 56px; border-radius: 16px 16px 8px 8px; }

		/* Jump: right side */
		#btn-jump  { right: 24px; bottom: 24px; width: 96px; height: 96px; font-size: 20px; }

		@media (pointer: coarse), (max-width: 768px) {
			#touch-controls { display: block; }
			#controls { display: none; }
		}
	</style>
</head>
<body>
	<div id="status">Connecting...</div>
	<div id="controls">Arrow keys / WASD to move, Space to jump</div>
	<canvas id="game"></canvas>

	<div id="touch-controls">
		<div id="btn-up" class="touch-btn">&uarr;</div>
		<div id="btn-left" class="touch-btn">&larr;</div>
		<div id="btn-right" class="touch-btn">&rarr;</div>
		<div id="btn-jump" class="touch-btn">JUMP</div>
	</div>

	<script src="game.js"></script>
</body>
</html>
